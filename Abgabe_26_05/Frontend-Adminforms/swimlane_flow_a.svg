<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" width="980" height="400" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7c3aed"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#059669"/>
    </marker>
    <marker id="arr-d" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto">
      <polygon points="0 0,6 0,3 8" fill="#7c3aed"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="400" fill="#ffffff" rx="12"/>

  <!-- Title bar -->
  <rect width="980" height="36" fill="#7c3aed" rx="12"/>
  <rect y="24" width="980" height="12" fill="#7c3aed"/>
  <text x="20" y="23" font-size="12" font-weight="700" fill="white" letter-spacing="0.06em">FLOW A: GET /admin/stats</text>

  <!-- Lane dividers -->
  <line x1="245" y1="36" x2="245" y2="400" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="490" y1="36" x2="490" y2="400" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="735" y1="36" x2="735" y2="400" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Lane headers -->
  <rect x="0"   y="36" width="245" height="30" fill="#f5f3ff"/>
  <rect x="245" y="36" width="245" height="30" fill="#f5f3ff"/>
  <rect x="490" y="36" width="245" height="30" fill="#f5f3ff"/>
  <rect x="735" y="36" width="245" height="30" fill="#f5f3ff"/>
  <line x1="0" y1="66" x2="980" y2="66" stroke="#e5e7eb" stroke-width="1.5"/>

  <text x="122" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">① BROWSER / ADMIN</text>
  <text x="367" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">② REACT FRONTEND</text>
  <text x="612" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">③ FASTAPI BACKEND</text>
  <text x="857" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">④ SQLITE-DB</text>

  <!-- ROW 1: Klick Admin -->
  <rect x="16" y="86" width="188" height="44" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="110" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Klick „Admin"</text>
  <text x="110" y="120" text-anchor="middle" font-size="11" fill="#5b21b6">in der Sidebar</text>

  <line x1="204" y1="108" x2="262" y2="108" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="233" y="103" text-anchor="middle" font-size="9" fill="#9ca3af">State</text>

  <!-- AdminDashboard mountet -->
  <rect x="262" y="86" width="196" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="360" y="105" text-anchor="middle" font-size="11" fill="#374151">AdminDashboard</text>
  <text x="360" y="120" text-anchor="middle" font-size="11" fill="#374151">mountet</text>

  <line x1="360" y1="130" x2="360" y2="154" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <!-- useEffect -->
  <rect x="262" y="154" width="196" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="360" y="173" text-anchor="middle" font-size="11" fill="#374151">useEffect →</text>
  <text x="360" y="188" text-anchor="middle" font-size="11" fill="#374151">getAdminStats()</text>

  <line x1="458" y1="176" x2="506" y2="176" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="482" y="170" text-anchor="middle" font-size="9" fill="#9ca3af">Bearer</text>

  <!-- GET /admin/stats -->
  <rect x="506" y="154" width="196" height="44" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="604" y="173" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">GET /admin/stats</text>
  <text x="604" y="188" text-anchor="middle" font-size="11" fill="#92400e">+ JWT-Prüfung</text>

  <line x1="702" y1="176" x2="750" y2="176" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="726" y="170" text-anchor="middle" font-size="9" fill="#9ca3af">SQL</text>

  <!-- DB box -->
  <rect x="750" y="154" width="214" height="120" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="857" y="176" text-anchor="middle" font-size="11" fill="#065f46">COUNT(users.id)</text>
  <line x1="766" y1="184" x2="948" y2="184" stroke="#a7f3d0" stroke-width="1"/>
  <text x="857" y="198" text-anchor="middle" font-size="11" fill="#065f46">COUNT DISTINCT (active 7d)</text>
  <line x1="766" y1="206" x2="948" y2="206" stroke="#a7f3d0" stroke-width="1"/>
  <text x="857" y="220" text-anchor="middle" font-size="11" fill="#065f46">COUNT(entries)</text>
  <line x1="766" y1="228" x2="948" y2="228" stroke="#a7f3d0" stroke-width="1"/>
  <text x="857" y="244" text-anchor="middle" font-size="11" fill="#065f46">COUNT / SUM(ai_logs)</text>

  <!-- Return: DB -> FastAPI -->
  <line x1="750" y1="298" x2="702" y2="298" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <text x="726" y="292" text-anchor="middle" font-size="9" fill="#9ca3af">Rows</text>

  <!-- HTTP 200 -->
  <rect x="506" y="278" width="196" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="604" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">HTTP 200</text>
  <text x="604" y="312" text-anchor="middle" font-size="11" fill="#065f46">+ JSON</text>

  <!-- Return: FastAPI -> React -->
  <line x1="506" y1="300" x2="458" y2="300" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <text x="482" y="294" text-anchor="middle" font-size="9" fill="#9ca3af">JSON</text>

  <!-- setStats -->
  <rect x="262" y="278" width="196" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="360" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">setStats(data) →</text>
  <text x="360" y="312" text-anchor="middle" font-size="11" fill="#065f46">StatCards rendern</text>

  <!-- Return: React -> Browser -->
  <line x1="262" y1="300" x2="204" y2="300" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <text x="233" y="294" text-anchor="middle" font-size="9" fill="#9ca3af">UI</text>

  <!-- Stats angezeigt -->
  <rect x="16" y="278" width="188" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="110" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Stats-Zahlen</text>
  <text x="110" y="312" text-anchor="middle" font-size="11" fill="#065f46">angezeigt ✓</text>

  <!-- Legend -->
  <line x1="20" y1="365" x2="52" y2="365" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="58" y="369" font-size="10" fill="#6b7280">Hinweg (Request / State-Update)</text>
  <line x1="320" y1="365" x2="352" y2="365" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="358" y="369" font-size="10" fill="#6b7280">Rückweg (Response / UI-Render)</text>
</svg>
